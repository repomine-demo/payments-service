version: "3.9"

services:
  payments-service:
    build: .
    ports:
      - "8002:8002"
    environment:
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8001}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - DATABASE_URL=postgresql://shopstack:shopstack@db:5432/payments
      - PORT=8002
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shopstack
      POSTGRES_PASSWORD: shopstack
      POSTGRES_DB: payments
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopstack -d payments"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

# Note: AUTH_SERVICE_URL must point to a running auth-service instance.
# For full-stack local dev, use the root docker-compose.yml in shopstack-platform.
